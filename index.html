<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZVARKO COIN</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
    letter-spacing: 3px;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 22px;
    margin: 20px 0;
}

.coin-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    margin: 20px auto;
    cursor: pointer;
    box-shadow: 0 0 25px orange;
    transition: 0.1s;
    position: relative;
}

.coin-btn:active {
    transform: scale(0.9);
}

.coin-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* floating +1 animation */
.plus {
    position: absolute;
    color: orange;
    font-weight: bold;
    animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
    0% {opacity: 1; transform: translateY(0);}
    100% {opacity: 0; transform: translateY(-60px);}
}

.shop {
    margin-top: 20px;
}

.shop button {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: orange;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

.shop button:hover {
    background: gold;
}
</style>
</head>

<body>

<h1>ZVARKO COIN</h1>

<div class="stats">
    <div>💰 <span id="coins">0</span></div>
    <div>⚡ <span id="perSec">0</span>/sec</div>
</div>

<div class="coin-btn" onclick="tap(event)">
    <img src="avatar.jpg">
</div>

<h2>🛒 Магазин</h2>

<div class="shop">
    <button onclick="buy(1)">+1 /sec (10)</button>
    <button onclick="buy(2)">+5 /sec (50)</button>
    <button onclick="buy(3)">+10 /sec (100)</button>
</div>

<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let perSec = parseInt(localStorage.getItem("perSec")) || 0;

function update() {
    document.getElementById("coins").innerText = coins;
    document.getElementById("perSec").innerText = perSec;
}

function save() {
    localStorage.setItem("coins", coins);
    localStorage.setItem("perSec", perSec);
}

function tap(e) {
    coins++;

    // +1 анімація
    let plus = document.createElement("div");
    plus.className = "plus";
    plus.innerText = "+1";
    plus.style.left = e.offsetX + "px";
    plus.style.top = e.offsetY + "px";

    document.querySelector(".coin-btn").appendChild(plus);

    setTimeout(() => plus.remove(), 1000);

    update();
    save();
}

function buy(type) {
    if (type === 1 && coins >= 10) {
        coins -= 10;
        perSec += 1;
    }
    if (type === 2 && coins >= 50) {
        coins -= 50;
        perSec += 5;
    }
    if (type === 3 && coins >= 100) {
        coins -= 100;
        perSec += 10;
    }

    update();
    save();
}

// пасивний дохід
setInterval(() => {
    coins += perSec;
    update();
    save();
}, 1000);

update();
</script>

</body>
</html>
